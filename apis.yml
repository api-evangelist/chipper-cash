aid: chipper-cash
name: Chipper Cash
description: >-
  Chipper Cash is a pan-African fintech (legal entities Critical Ideas, Inc.
  and Voyse Technologies US, Inc.) operating a mobile-first cross-border money
  transfer, digital payments, crypto, and investing platform across Africa and
  the diaspora. Founded in 2018 by Ham Serunjogi (Uganda) and Maijid Moujaled
  (Ghana) after they met at Grinnell College in Iowa, Chipper became one of
  Africa's fintech unicorns in 2021 and has raised over $340M to date. The
  consumer app — available on iOS, Android, and web — supports peer-to-peer
  and cross-border transfers across 21+ African countries, virtual Visa cards
  (Chipper Card), bill pay and airtime top-ups, fractional US-stock investing
  (Chipper Stocks, 6,000+ public companies, from $1), and historically crypto
  trading (BTC/ETH). Reported scale includes 5M+ registered users, 1M+ Visa
  cards issued, and 250,000+ daily transactions. Direct consumer markets
  include Nigeria, Ghana, Uganda, Tanzania, South Africa, Rwanda, the UK,
  and the US. On the developer side, Chipper exposes the Chipper Network API
  ("Pay With Chipper") — a merchant-facing API that lets authorized
  businesses accept cross-border payments across 9 currencies, initiate
  payouts, issue refunds, and look up Chipper user accounts, authenticated
  with a Chipper User ID + Network API Key. Documentation is published as a
  Postman collection and access is gated by merchant onboarding; no public
  OpenAPI or open-source SDK is currently published. Adjacent products
  include Chipper ID (AI-led identity verification), Chipper Enterprise
  (bulk payments and collections), Business Accounts, and Zoona (agent-network
  remittances), plus an integration with TBD's tbDEX protocol for
  decentralized cross-border payments.
